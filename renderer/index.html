<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ópti.IA FFmpeg Converter</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <img class="brand-logo" src="./logo.png" alt="Ópti.IA">
            <button class="menu-button" type="button" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <section class="hero" aria-labelledby="page-title">
            <p class="eyebrow">Conversor FFmpeg</p>
            <h1 id="page-title">Seu vídeo grande rodando em <span>MP4 leve.</span></h1>
            <p class="intro">Converta MOV, MP4, AVI ou MKV para um arquivo otimizado em H.264, 540px, 24 fps e pronto para compartilhar.</p>

            <label class="drop-zone" id="dropZone" for="videoFile">
                <input id="videoFile" type="file" accept="video/*,.mov,.mp4,.m4v,.avi,.mkv">
                <span class="drop-title">Selecionar vídeo</span>
                <span class="drop-subtitle" id="fileStatus">Arraste o arquivo aqui ou clique para escolher</span>
            </label>

            <div class="file-card hidden" id="fileCard">
                <div class="file-info">
                    <span class="file-label">Arquivo selecionado</span>
                    <strong id="fileName"></strong>
                    <small id="fileMeta"></small>
                </div>
                <button class="ghost-button" id="changeFileButton" type="button">Trocar</button>
            </div>

            <div class="actions">
                <button class="primary-button" id="convertButton" type="button" disabled>Converter vídeo</button>
                <button class="secondary-button hidden" id="downloadButton" type="button">Salvar MP4</button>
            </div>

            <div class="progress-area" aria-live="polite">
                <div class="progress-header">
                    <span id="progressMessage">Aguardando arquivo</span>
                    <strong id="progressValue">0%</strong>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <p class="feedback" id="feedback" role="status"></p>

            <div class="trust-row" aria-label="Características">
                <span>H.264 otimizado</span>
                <span>Áudio AAC 64k</span>
                <span>Fast start</span>
            </div>
        </section>
    </main>

    <script src="./app.js"></script>
</body>
</html>
